  - id: pipeline.modification_intelligence
    title: Contract Modification Intelligence
    domain: pipeline
    description: >
      Analyzes every contract's modification trail to surface strategic signals.
      Classifies modification patterns (scope growth, option-heavy, funding-only,
      change-driven) and computes a lock-in score indicating incumbent entrenchment.
      Flags anomalous modification activity compared to agency×NAICS medians.
      Answers: is this contract growing or static? Is the incumbent locked in or
      vulnerable? Are the modifications unusual for this market?
    example_queries:
      - query: /v1/datasets/pipeline.modification_intelligence/rows?contracting_agency_id=9700&pattern_classification=scope_growth&limit=25
        explanation: Find Army contracts with significant scope growth (incumbents are expanding their footprint).
      - query: /v1/datasets/pipeline.modification_intelligence/rows?contracting_agency_id=9700&anomaly_flag=true&limit=25
        explanation: Contracts with unusual modification activity at Army.
      - query: /v1/datasets/pipeline.modification_intelligence/rows?contracting_agency_id=9700&lock_in_score_min=70&limit=25
        explanation: Contracts where the incumbent is strongly entrenched.
    backing_view: analytics_api.pipeline_modification_intelligence
    source_view: pipeline_intelligence.report_deck_contract_modification_intelligence
    grain: piid
    query_pattern: ranked
    grain_keys:
      - piid
    department_code_format: fpds_4digit
    joins_to:
      - dataset: pipeline.contract_transactions
        on:
          piid: piid
      - dataset: pipeline.duration_profile
        on:
          principal_naics_code: principal_naics_code
    public_access: api_key
    required_filters_any: [contracting_agency_id, contracting_dept_id, contracting_office_id, piid, uei, pattern_classification]
    filters:
      - piid
      - uei
      - contracting_dept_id
      - contracting_agency_id
      - contracting_office_id
      - principal_naics_code
      - pattern_classification
      - anomaly_flag
      - lock_in_score_min
    sortable: [lock_in_score, mod_count, mod_span_months, scope_growth_count, option_exercise_count, net_obligation_change]
    default_sort: -lock_in_score
    max_limit: 500
    fields:
      - piid
      - vendor_name
      - uei
      - contracting_dept_id
      - contracting_dept_name
      - contracting_agency_id
      - contracting_agency_name
      - contracting_office_id
      - contracting_office_name
      - principal_naics_code
      - principal_naics_code_desc
      - product_or_service_code
      - product_or_service_code_desc
      - extent_competed
      - extent_competed_desc
      - base_signed_date
      - base_obligated_amount
      - base_completion_date
      - mod_count
      - mod_pattern
      - first_mod_date
      - last_mod_date
      - mod_span_months
      - scope_growth_count
      - option_exercise_count
      - funding_mod_count
      - change_order_count
      - deobligation_count
      - deobligation_total
      - net_obligation_change
      - max_single_mod_amount
      - pattern_classification
      - lock_in_score
      - agency_naics_median_mod_count
      - mod_count_vs_median_pct
      - anomaly_flag
    caveats:
      - Pattern classification is heuristic. A 'static' contract may still have unexercised options not visible in FPDS.
      - Agency×NAICS medians require a minimum of 5 contracts per cell; cells below this threshold use the agency-wide median.
      - Modification reason codes are reported by contracting officers and may be inconsistently applied across agencies.
      - The lock-in score is a directional signal, not a guarantee. Always cross-reference with competition data.
