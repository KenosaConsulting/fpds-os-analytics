version: "2026-06-03"
source_reference: "docs/analytics-schema-reference.md"
notes:
  - "Initial public API catalog exposes report-deck views first."
  - "The source reference headline says 21 report views; this catalog includes 22 because naics_breakdown.report_deck_naics_kpi_summary is defined in the migration."
  - "Numeric money fields should be serialized as strings by the API service."

defaults:
  limit: 100
  max_limit: 1000
  order: "-fiscal_year"
  required_filters: []
  caveats:
    - "FPDS obligations can include negative de-obligations."
    - "Fiscal years follow the federal October-September convention."

datasets:
  - id: "pricing.trend_fy"
    title: "Pricing Trend By Fiscal Year"
    domain: "pricing"
    backing_view: "analytics_api.pricing_trend_fy"
    source_view: "contract_pricing.report_deck_pricing_trend_fy"
    grain: "fiscal_year"
    public_access: "public_bounded"
    filters: ["fiscal_year", "fiscal_year_min", "fiscal_year_max"]
    sortable: ["fiscal_year", "total_obligated", "fixed_price_obligation_share", "cost_type_obligation_share", "tm_obligation_share"]
    default_sort: "fiscal_year"
    fields: ["fiscal_year", "is_current_fiscal_year_ytd", "fixed_price_action_count", "fixed_price_obligated", "cost_type_action_count", "cost_type_obligated", "tm_action_count", "tm_obligated", "other_action_count", "other_obligated", "total_action_count", "total_obligated", "fixed_price_action_share", "cost_type_action_share", "tm_action_share", "fixed_price_obligation_share", "cost_type_obligation_share", "tm_obligation_share"]

