# ── Contract Transaction History ──────────────────────────────────────────────

  - id: pipeline.contract_transactions
    title: Contract Transaction History
    domain: pipeline
    description: >
      Transaction-level detail for any contract PIID — every modification, description,
      reason, obligation amount, and date. This is the drill-down layer: the recompete
      watchlist tells you WHICH contracts are expiring; this dataset tells you WHAT
      HAPPENED on each one. Use it to understand the modification history, scope changes,
      option exercises, funding increments, and de-obligations on a specific contract.
      Required filter: piid.
    example_queries:
      - query: /v1/datasets/pipeline.contract_transactions/rows?piid=W31P4Q21FB004&limit=50&sort=-signed_date
        explanation: Show all transactions for a specific contract, newest first.
      - query: /v1/datasets/pipeline.contract_transactions/rows?piid=W31P4Q21FB004&reason_for_modification=B&limit=50
        explanation: Show only supplemental agreements (scope changes) for a contract.
    field_descriptions:
      description_of_contract_requirement: The SOW or requirement description for this contract action.
      reason_for_modification_desc: Human-readable reason for this modification (e.g. Exercise an Option, Supplemental Agreement).
      mod_number: Modification number (e.g. P00001, P00042). Base award is typically blank or 0.
      transaction_number: Sub-transaction within a modification (usually 1, sometimes 2+ for split actions).
      contract_action_type_desc: Type of contract action (e.g. Delivery Order, Definitive Contract, BPA Call).
      obligated_amount: Dollars obligated on this specific transaction. Negative values indicate de-obligations.
      base_and_all_options_value: Total value including exercised and unexercised options.
      signed_date: Date the action was signed.
      effective_date: Date the action takes effect.
      current_completion_date: Current expected completion date (may shift with mods).
      ultimate_completion_date: Final completion date including all options.
    backing_view: analytics_api.pipeline_contract_transactions
    source_view: pipeline_intelligence.report_deck_contract_transactions
    grain: piid x mod_number x transaction_number
    query_pattern: drill_down
    grain_keys:
      - piid
      - mod_number
      - transaction_number
    department_code_format: fpds_4digit
    joins_to:
      - dataset: pipeline.recompete_watchlist
        on:
          piid: piid
      - dataset: pipeline.modification_intelligence
        on:
          piid: piid
    public_access: api_key
    required_filters_any: [piid]
    required_filters: [piid]
    filters: [piid, contracting_dept_id, contracting_agency_id, contracting_office_id, product_or_service_code, principal_naics_code, reason_for_modification, contract_action_type, extent_competed, signed_date, effective_date, mod_number]
    sortable: [signed_date, effective_date, obligated_amount, base_and_all_options_value, mod_number]
    default_sort: -signed_date
    limit: 500
    max_limit: 1000
    fields:
      - piid
      - mod_number
      - transaction_number
      - description_of_contract_requirement
      - reason_for_modification
      - reason_for_modification_desc
      - contract_action_type
      - contract_action_type_desc
      - obligated_amount
      - base_and_all_options_value
      - base_and_exercised_options_value
      - effective_date
      - signed_date
      - current_completion_date
      - ultimate_completion_date
      - vendor_name
      - uei
      - contracting_dept_id
      - contracting_dept_name
      - contracting_agency_id
      - contracting_agency_name
      - contracting_office_id
      - contracting_office_name
      - product_or_service_code
      - product_or_service_code_desc
      - principal_naics_code
      - principal_naics_code_desc
      - extent_competed
      - extent_competed_desc
      - set_aside
      - set_aside_desc
      - offers_received
      - idv_piid
      - idv_agency_id
      - idv_mod_number
    caveats: ['The piid filter is required — unfiltered queries are not allowed on this dataset.', obligated_amount can be negative for de-obligations or corrections — sum without checking sign at your peril., 'description_of_contract_requirement is the FPDS free-text field; it may be blank or generic for some modifications.', 'A single modification may have multiple transaction_number rows when the agency reports split actions.']
  - id: entrants.agency_cohort_fy
    title: New-Entrant Agency Cohorts By Fiscal Year
    domain: entrants
    description: New-Entrant Agency Cohorts By Fiscal Year shows when vendors first appear at each contracting agency and how large their first-year foothold was. Use it to judge whether an agency has a real pathway for newcomers and whether first wins survive into later fiscal years.
    example_queries:
      - query: /v1/datasets/entrants.agency_cohort_fy/rows?contracting_agency_id=9700&limit=25
        explanation: Show yearly new-vendor cohorts for one contracting agency.
    field_descriptions:
      median_first_year_obligated: Median first-year net obligations among vendors whose first active year at the agency is this fiscal year.
      set_aside_first_year_obligation_share: Share of derivable first-year contract-family obligations using a non-empty set-aside code.
      survival_2fy_rate: Share of cohort vendors still active at the same agency two fiscal years later; null for the two most recent fiscal years.
    backing_view: analytics_api.entrants_agency_cohort_fy
    source_view: vendor_concentration.report_deck_entrants_agency_cohort_fy
    grain: contracting_agency_id x first_active_fiscal_year
    query_pattern: ranked
    grain_keys:
