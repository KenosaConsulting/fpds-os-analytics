  - id: concentration.trend_fy
    title: Market Concentration Trend By Fiscal Year
    domain: concentration
    description: Market Concentration Trend By Fiscal Year provides the catalog view for this package. Market concentration analytics summarize vendor concentration, incumbent strength, and small-business participation. Use this dataset to judge whether a market is open, concentrated, or dominated by a few long-running vendors.
    example_queries:
      - query: /v1/datasets/concentration.trend_fy/rows?fiscal_year=2024&limit=25
        explanation: Return a bounded sample from Market Concentration Trend By Fiscal Year using catalog-supported filters.
    field_descriptions:
      avg_hhi: Average Herfindahl-Hirschman Index; higher values indicate more concentrated markets.
      small_biz_obligation_share_pct: Percent of obligations awarded to small businesses.
    backing_view: analytics_api.concentration_trend_fy
    source_view: vendor_concentration.report_deck_concentration_trend_fy
    grain: fiscal_year
    query_pattern: browse
    grain_keys:
      - fiscal_year
    public_access: public_bounded
    filters: [fiscal_year, fiscal_year_min, fiscal_year_max]
    sortable: [fiscal_year, avg_hhi, highly_concentrated_markets, competitive_markets]
    default_sort: -fiscal_year
    fields:
      - fiscal_year
      - is_current_fiscal_year_ytd
      - analyzed_markets
      - highly_concentrated_markets
      - moderately_concentrated_markets
      - competitive_markets
      - highly_concentrated_pct
      - avg_hhi
      - avg_top_vendor_share_pct
      - avg_top_3_vendor_share_pct
      - avg_vendors_per_market
      - small_biz_obligation_share_pct
      - avg_small_biz_vendors_per_market
      - total_market_obligation
    caveats: [Concentration markets require at least two distinct vendors and positive total obligation.]
