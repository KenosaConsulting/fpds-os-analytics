  # ── Package 6: Set-Aside & Socioeconomic Programs ──────────────────────

  - id: "set_aside.trend_fy"
    title: "Set-Aside Trend By Fiscal Year"
    domain: "set_aside"
    backing_view: "analytics_api.set_aside_trend_fy"
    source_view: "set_aside_breakdown.report_deck_overall_trend_fy"
    grain: "fiscal_year"
    public_access: "public_bounded"
    filters: ["fiscal_year", "fiscal_year_min", "fiscal_year_max"]
    sortable: ["fiscal_year", "net_obligated_amount", "setaside_action_share_known", "setaside_obligation_share_known"]
    default_sort: "fiscal_year"
    fields: ["fiscal_year", "is_current_fiscal_year_ytd", "action_count", "contract_scope_action_count", "base_award_action_count", "modification_action_count", "known_setaside_status_count", "unknown_setaside_status_count", "no_setaside_action_count", "positive_setaside_action_count", "net_obligated_amount", "known_status_net_obligated_amount", "positive_setaside_net_obligated_amount", "contract_scope_net_obligated_amount", "contract_scope_positive_setaside_net_obligated_amount", "setaside_action_share_all", "setaside_action_share_known", "contract_scope_setaside_action_share_known", "setaside_obligation_share_known", "contract_scope_setaside_obligation_share_known", "unknown_status_share", "modification_share", "base_award_setaside_share_known"]
    caveats:
      - "Set-aside status coding in FPDS changed over time. The unknown_status_share field indicates data quality — higher values mean more actions lack set-aside classification."
      - "Shares are computed against known-status actions only, not total actions, to avoid deflating rates due to missing data."

