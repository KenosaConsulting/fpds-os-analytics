  - id: opportunity.radar
    title: Cross-Agency Opportunity Radar
    domain: opportunity
    description: >
      Collaborative-filtering recommendation engine for federal procurement.
      For each vendor with a multi-agency footprint, finds agencies they don't
      currently sell to but should — based on NAICS portfolio similarity to
      agencies where they already win. Scores recommendations by market similarity,
      agency spend, and entry accessibility. Think "agencies like the ones you
      already succeed at, where you have zero presence."
    example_queries:
      - query: /v1/datasets/opportunity.radar/rows?vendor_uei=JF1HN11D8NU5&limit=25
        explanation: Top agency recommendations for a specific vendor ranked by score.
      - query: /v1/datasets/opportunity.radar/rows?vendor_uei=JF1HN11D8NU5&vendor_is_small_business=true&recommendation_score_min=50&limit=50
        explanation: Strong recommendations filtered for small business status.
    backing_view: analytics_api.opportunity_radar
    source_view: opportunity_intelligence.report_deck_cross_agency_opportunity_radar
    grain: vendor_uei x recommended_agency_id
    query_pattern: lookup
    grain_keys:
      - vendor_uei
      - recommended_agency_id
    department_code_format: fpds_4digit
    public_access: api_key
    required_filters_any: [vendor_uei]
    filters: [vendor_uei, recommended_agency_id, vendor_is_small_business, recommendation_score_min, jaccard_similarity_min]
    sortable: [recommendation_score, jaccard_similarity, candidate_agency_3yr_obligated, avg_entry_difficulty]
    default_sort: -recommendation_score
    max_limit: 500
    fields:
      - vendor_uei
      - vendor_name
      - vendor_is_small_business
      - vendor_current_agency_count
      - recommended_agency_id
      - recommended_agency_name
      - shared_naics_codes
      - jaccard_similarity
      - candidate_agency_3yr_obligated
      - avg_entry_difficulty
      - recommendation_score
      - vendor_existing_agencies
      - recommended_agency_top_naics
    caveats:
      - Recommendations are based on NAICS portfolio similarity, not win probability. Always cross-reference with entry difficulty and competition data.
      - Vendors must have a footprint at 2+ agencies to generate recommendations.
      - Data refreshes with the analytics refresh cycle. New vendor wins may not be reflected immediately.

  - id: concentration.vendor_cross_agency_rank
    title: Vendor Cross-Agency Rank
    domain: concentration
    description: >
      Shows each vendor's rank and obligation share across all agencies for each fiscal year.
      Enables queries like "what other agencies does vendor X lead?" (Q13) and cross-agency
      vendor market analysis. Includes agency_rank, total_across_agencies, agency_share_pct,
      and agency_count for each vendor × agency × year cell.
    example_queries:
      - query: /v1/datasets/concentration.vendor_cross_agency_rank/rows?uei=C114HTL5ADV7&fiscal_year=2024&limit=25
        explanation: Show all agencies where CUMMINS INC. had obligations in FY2024, ranked
      - query: /v1/datasets/concentration.vendor_cross_agency_rank/rows?fiscal_year=2024&agency_rank=1&limit=50
        explanation: Vendors ranked #1 in any agency for FY2024
    backing_view: analytics_api.concentration_vendor_cross_agency_rank
    source_view: vendor_concentration.report_deck_vendor_cross_agency_rank
    grain: uei x contracting_agency_id x fiscal_year
