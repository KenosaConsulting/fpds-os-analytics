        on:
          contracting_dept_id: contracting_dept_id
      - dataset: pricing.dept_year_summary
        on:
          contracting_dept_id: contracting_dept_id
          fiscal_year: fiscal_year
    public_access: public_bounded
    required_filters_any: [fiscal_year, contracting_dept_id]
    filters: [fiscal_year, fiscal_year_min, fiscal_year_max, contracting_dept_id]
    sortable: [fiscal_year, contracting_dept_id, total_obligated_amount, cost_type_obligation_share, tm_obligation_share]
    default_sort: -total_obligated_amount
    fields:
      - contracting_dept_id
      - fiscal_year
      - is_current_fiscal_year_ytd
      - total_action_count
      - total_obligated_amount
      - fixed_price_action_count
      - fixed_price_obligated
      - cost_type_action_count
      - cost_type_obligated
      - tm_action_count
      - tm_obligated
      - other_action_count
      - other_obligated
      - fixed_price_action_share
      - cost_type_action_share
      - tm_action_share
      - fixed_price_obligation_share
      - cost_type_obligation_share
      - tm_obligation_share
